[defaults]
# Path to your hosts file or inventory directory
inventory = ./inventory.yaml

# System user to authenticate against managed nodes
remote_user = ubuntu

# Disables host key prompts (ideal for automated environments)
host_key_checking = False

# Maximum simultaneous connections to spin up at once
forks = 10

# Timeout duration for SSH connection attempts (seconds)
timeout = 30

# Avoids Python interpreter warning messages on target hosts
interpreter_python = auto_silent

[privilege_escalation]
# Automatically elevate permissions on target hosts
become = True

# Standard method used for privilege escalation
become_method = sudo

# Target administrative user for privilege escalation
become_user = root

# Automatically prompt for user passwords during runs
become_ask_pass = False

