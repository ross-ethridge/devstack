kubernetes:
  children:
    libvirt:
      hosts:
        cp1:
          ansible_host: "{{ vault.cp1.ansible_host }}"
          ansible_user: "{{ vault.cp1.ansible_user }}"
          ansible_ssh_private_key_file: "{{ vault.cp1.ansible_ssh_private_key_file }}"
        worker1:
          ansible_host: "{{ vault.worker1.ansible_host }}"
          ansible_user: "{{ vault.worker1.ansible_user }}"
          ansible_ssh_private_key_file: "{{ vault.worker1.ansible_ssh_private_key_file }}"
        worker2:
          ansible_host: "{{ vault.worker2.ansible_host }}"
          ansible_user: "{{ vault.worker2.ansible_user }}"
          ansible_ssh_private_key_file: "{{ vault.worker2.ansible_ssh_private_key_file }}"
